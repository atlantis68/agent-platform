<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Platform - Phase 2</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f7f8fa;
      color: #20242a;
    }
    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 28px;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 8px;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 380px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }
    section {
      background: #ffffff;
      border: 1px solid #d9dde3;
      border-radius: 8px;
      padding: 16px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #c9ced6;
      border-radius: 6px;
      padding: 10px;
      font: inherit;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    button {
      margin-top: 14px;
      width: 100%;
      border: 0;
      border-radius: 6px;
      padding: 11px 14px;
      background: #1769aa;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #101820;
      color: #e6edf3;
      border-radius: 6px;
      padding: 12px;
      min-height: 280px;
      overflow: auto;
    }
    .meta {
      color: #5e6773;
      margin-bottom: 18px;
    }
    @media (max-width: 820px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<main>
  <h1>Agent Platform</h1>
  <div class="meta">Phase 2 local console: Agent Run, tool events, SSE stream, short-term memory, basic audit.</div>
  <div class="layout">
    <section>
      <label for="conversationId">Conversation ID</label>
      <input id="conversationId" value="conv_demo">
      <label for="prompt">Input</label>
      <textarea id="prompt">请 echo 阶段 2 工具，并查询 mcp 时间</textarea>
      <button id="runButton">Create Agent Run</button>
    </section>
    <section>
      <strong>Events</strong>
      <pre id="events">Waiting for run...</pre>
    </section>
  </div>
</main>
<script>
  const eventsNode = document.querySelector("#events");
  const runButton = document.querySelector("#runButton");

  function append(line) {
    eventsNode.textContent += `\n${line}`;
  }

  runButton.addEventListener("click", async () => {
    eventsNode.textContent = "Creating run...";
    const body = {
      agentId: "agent_general_001",
      input: {
        type: "text",
        text: document.querySelector("#prompt").value
      },
      context: {
        conversationId: document.querySelector("#conversationId").value,
        source: "web"
      }
    };

    const response = await fetch("/api/v1/agent-runs", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body)
    });
    const run = await response.json();
    eventsNode.textContent = JSON.stringify(run, null, 2);

    const source = new EventSource(run.eventStreamUrl);
    source.onmessage = event => append(event.data);
    source.addEventListener("run.output.delta", event => append(event.data));
    source.addEventListener("run.completed", event => {
      append(event.data);
      source.close();
    });
    source.onerror = () => {
      append("SSE connection closed.");
      source.close();
    };
  });
</script>
</body>
</html>
